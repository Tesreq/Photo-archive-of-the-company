{% extends 'base.html' %}
{% block content %}
  <section class="photo-detail">
    <div class="photo-detail__image">📷</div>
    <div>
      <h1>{{ photo.title }}</h1>
      <p class="meta">Автор: {{ photo.author }} | Дата: {{ photo.created_at.strftime('%d.%m.%Y') }}</p>
      <p>{{ photo.description or 'Описание отсутствует.' }}</p>
      <p><strong>Имя файла:</strong> {{ photo.filename }}</p>
      <a class="button button--secondary" href="{{ url_for('archive') }}">Вернуться в архив</a>
    </div>
  </section>
{% endblock %}
