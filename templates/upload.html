{% extends 'base.html' %}

{% block title %}Добавление файла — Фотоархив компании{% endblock %}

{% block content %}
  <section class="modal-card upload-card">
    <div class="modal-card__header">
      <h1>Добавление файла</h1>
      <a href="{{ url_for('search') }}" aria-label="Закрыть">×</a>
    </div>

    <form class="upload-form" method="post" enctype="multipart/form-data">
      <div class="upload-form__main">
        <div class="upload-form__left">
          <label class="field-label">Файл</label>
          <label class="dropzone">
            <input type="file" name="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.tif,.tiff" required>
            <span>Перетащите файл сюда</span>
            <small>или</small>
            <strong>Выбрать файл</strong>
            <em>Любой файл · без ограничения размера</em>
          </label>

          <label>
            Дата оригинала документа<span>*</span>
            <input type="date" name="original_date" required>
          </label>

          <label>
            Краткое описание
            <textarea name="description" rows="4" placeholder="Введите краткое описание документа"></textarea>
          </label>

          <label>
            Ключевые слова<span>*</span> <small class="muted">(через запятую)</small>
            <input type="text" name="keywords" required placeholder="договор, аренда, 2026">
          </label>
        </div>

        <aside class="preview">
          <h2>Предпросмотр</h2>
          <div class="preview__page" id="uploadPreview">
            <span>Документ</span>
            <i></i><i></i><i></i><i></i><i></i>
          </div>
        </aside>
      </div>

      <div class="modal-card__actions">
        <a class="button button--outline" href="{{ url_for('search') }}">Отмена</a>
        <button class="button" type="submit">Сохранить</button>
      </div>
    </form>
  </section>
{% endblock %}
