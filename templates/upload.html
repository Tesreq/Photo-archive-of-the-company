{% extends 'base.html' %}

{% block title %}Добавление файла — Фотоархив компании{% endblock %}

{% block content %}
  <section class="modal-card upload-card">
    <div class="modal-card__header">
      <h1>Добавление файла</h1>
      <a href="{{ url_for('search') }}" aria-label="Закрыть">×</a>
    </div>

    <form class="upload-form" method="post" enctype="multipart/form-data">
      <div class="upload-form__main">
        <div class="upload-form__left">
          <label class="field-label">Файл</label>
          <label class="dropzone" for="fileInput" id="dropzone">
            <input id="fileInput" type="file" name="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.tif,.tiff" required>
            <span>Перетащите файл сюда</span>
            <small>или</small>
            <strong>Выбрать файл</strong>
            <em>Любой файл · без ограничения размера</em>
            <b class="dropzone__file" id="dropzoneFile"></b>
          </label>

          <label>
            Дата оригинала документа<span>*</span>
            <input type="date" name="original_date" required>
          </label>

          <label>
            Краткое описание
            <textarea name="description" rows="4" placeholder="Введите краткое описание документа"></textarea>
          </label>

          <label>
            Ключевые слова<span>*</span> <small class="muted">(через запятую)</small>
            <input type="text" name="keywords" required placeholder="договор, аренда, 2026">
          </label>
        </div>

        <aside class="preview">
          <h2>Предпросмотр</h2>
          <div class="preview__page preview__page--empty" id="uploadPreview">
            <span>Документ</span>
            <i></i><i></i><i></i><i></i><i></i>
          </div>
        </aside>
      </div>

      <div class="modal-card__actions">
        <a class="button button--outline" href="{{ url_for('search') }}">Отмена</a>
        <button class="button" type="submit">Сохранить</button>
      </div>
    </form>
  </section>
{% endblock %}

{% block scripts %}
  <script>
    (() => {
      const input = document.getElementById("fileInput");
      const preview = document.getElementById("uploadPreview");
      const dropzone = document.getElementById("dropzone");
      const dropzoneFile = document.getElementById("dropzoneFile");
      let previewUrl = null;

      if (!input || !preview || !dropzone || !dropzoneFile) return;

      const formatSize = (bytes) => {
        if (bytes < 1024) return `${bytes} байт`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} КБ`;
        return `${(bytes / 1024 / 1024).toFixed(1)} МБ`;
      };

      const escapeHtml = (value) => String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

      const extension = (name) => {
        const ext = name.split(".").pop();
        return ext && ext !== name ? ext.toUpperCase().slice(0, 5) : "FILE";
      };

      const renderPreview = (file) => {
        if (previewUrl) {
          URL.revokeObjectURL(previewUrl);
          previewUrl = null;
        }

        if (!file) {
          dropzone.classList.remove("dropzone--has-file");
          dropzoneFile.textContent = "";
          preview.className = "preview__page preview__page--empty";
          preview.innerHTML = "<span>Документ</span><i></i><i></i><i></i><i></i><i></i>";
          return;
        }

        previewUrl = URL.createObjectURL(file);
        dropzone.classList.add("dropzone--has-file");
        dropzoneFile.textContent = `${file.name} · ${formatSize(file.size)}`;

        if (file.type.startsWith("image/")) {
          preview.className = "preview__image preview__image--upload";
          preview.innerHTML = `
            <img src="${previewUrl}" alt="">
            <div class="preview__meta">
              <strong>${escapeHtml(file.name)}</strong>
              <small>${formatSize(file.size)} · ${escapeHtml(file.type || "file")}</small>
            </div>
          `;
          return;
        }

        if (file.type === "application/pdf") {
          preview.className = "preview__pdf preview__pdf--upload";
          preview.innerHTML = `
            <iframe class="preview__frame" src="${previewUrl}" title="${escapeHtml(file.name)}"></iframe>
            <div class="preview__meta">
              <strong>${escapeHtml(file.name)}</strong>
              <small>${formatSize(file.size)} · PDF</small>
            </div>
          `;
          return;
        }

        preview.className = "preview__file";
        preview.innerHTML = `
          <div class="preview__file-icon">${escapeHtml(extension(file.name))}</div>
          <div class="preview__meta">
            <strong>${escapeHtml(file.name)}</strong>
            <small>${formatSize(file.size)} · ${escapeHtml(file.type || "неизвестный тип")}</small>
          </div>
        `;
      };

      input.addEventListener("change", () => renderPreview(input.files && input.files[0]));

      ["dragenter", "dragover"].forEach((eventName) => {
        dropzone.addEventListener(eventName, (event) => {
          event.preventDefault();
          dropzone.classList.add("dropzone--drag");
        });
      });

      ["dragleave", "drop"].forEach((eventName) => {
        dropzone.addEventListener(eventName, () => {
          dropzone.classList.remove("dropzone--drag");
        });
      });

      dropzone.addEventListener("drop", (event) => {
        event.preventDefault();
        const file = event.dataTransfer.files && event.dataTransfer.files[0];
        if (!file) return;

        const transfer = new DataTransfer();
        transfer.items.add(file);
        input.files = transfer.files;
        renderPreview(file);
      });
    })();
  </script>
{% endblock %}
