{% extends 'base.html' %}

{% block title %}Регистрация — Фотоархив компании{% endblock %}

{% block content %}
  <section class="login-panel">
    <div class="login-card">
      <div class="login-card__header">
        <span class="brand__icon brand__icon--large">W</span>
        <h1>Регистрация</h1>
        <p>Создайте учётную запись для доступа к фотоархиву</p>
      </div>

      <form class="login-form" method="post">
        <label>
          Логин
          <input type="text" name="login" required minlength="3" autocomplete="username" placeholder="Придумайте логин">
        </label>
        <label>
          Пароль
          <input type="password" name="password" required minlength="4" autocomplete="new-password" placeholder="Придумайте пароль">
        </label>
        <label>
          Подтверждение пароля
          <input type="password" name="password_confirm" required minlength="4" autocomplete="new-password" placeholder="Повторите пароль">
        </label>
        <button class="button button--full" type="submit">Зарегистрироваться</button>
      </form>

      <div class="login-card__footer">
        <p>Уже есть аккаунт? <a href="{{ url_for('login_page') }}">Войти</a></p>
      </div>
    </div>
  </section>
{% endblock %}
