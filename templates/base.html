<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Фотоархив компании</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC3D+..." crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="{{ url_for('index') }}">Фотоархив</a>
        <nav>
          <a href="{{ url_for('archive') }}">Архив</a>
          <a href="{{ url_for('upload') }}">Добавить фото</a>
          <a href="{{ url_for('search') }}">Поиск</a>
        </nav>
      </div>
    </header>
    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <section class="messages">
            {% for category, message in messages %}
              <div class="message message--{{ category }}">{{ message }}</div>
            {% endfor %}
          </section>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <div class="container">Учебный проект по фотоархиву | Flask + SQLite</div>
    </footer>
  </body>
</html>
